# 念园系统 Nginx 配置
# 域名：https://ny.px-apricot.cn/
# 前端：/  后端 API：/api/
#
# 使用前请修改：
# 1. root 为前端 dist 实际路径
# 2. ssl_certificate / ssl_certificate_key 为你的证书路径
# 3. proxy_pass 中的后端地址（若后端不在本机）

server {
    listen 80;
    server_name ny.px-apricot.cn;
    return 301 https://$server_name$request_uri;
}

server {
    listen 443 ssl http2;
    server_name ny.px-apricot.cn;

    # SSL 证书（按实际路径修改）
    ssl_certificate     /path/to/your/fullchain.pem;
    ssl_certificate_key  /path/to/your/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;

    # 前端静态资源
    root /path/to/memorial-vue/dist;
    index index.html;

    # 前端 SPA 路由
    location / {
        try_files $uri $uri/ /index.html;
    }

    # 后端 API 代理（/api/ 转发到后端，并去掉 /api 前缀）
    location /api/ {
        proxy_pass http://127.0.0.1:2168/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
        # 文件上传大小限制（与 Spring 保持一致）
        client_max_body_size 100M;
    }
}
